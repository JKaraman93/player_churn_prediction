<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F0EC"/>
      <stop offset="1" stop-color="#EEF3FA"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#402D45"/>
      <stop offset="1" stop-color="#644E8D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#402D45" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 28px 'DejaVu Sans', Arial, sans-serif; fill: #FAF7FC; }
      .sub { font: 400 15px 'DejaVu Sans', Arial, sans-serif; fill: #E4DCEF; }
      .h { font: 700 21px 'DejaVu Sans', Arial, sans-serif; fill: #34263B; }
      .k { font: 600 13px 'DejaVu Sans', Arial, sans-serif; fill: #75627E; letter-spacing: 0.08em; }
      .v { font: 700 34px 'DejaVu Sans', Arial, sans-serif; fill: #34263B; }
      .txt { font: 400 16px 'DejaVu Sans', Arial, sans-serif; fill: #4F4158; }
      .small { font: 400 14px 'DejaVu Sans', Arial, sans-serif; fill: #67566F; }
      .mono { font: 400 14px 'DejaVu Sans Mono', monospace; fill: #4F4158; }
      .cellh { font: 700 18px 'DejaVu Sans', Arial, sans-serif; fill: #34263B; }
      .cellv { font: 700 28px 'DejaVu Sans', Arial, sans-serif; fill: #34263B; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="26" fill="url(#bg)"/>
  <rect x="22" y="22" width="1156" height="86" rx="20" fill="url(#top)"/>
  <text x="52" y="58" class="title">Screenshot Style Output 3: Backtest Summary</text>
  <text x="52" y="84" class="sub">Using evaluation metrics and confusion matrix artifacts stored in MLflow</text>

  <rect x="42" y="140" width="220" height="140" rx="22" fill="#F5F1FB" stroke="#9B86C3" stroke-width="2" filter="url(#shadow)"/>
  <text x="68" y="175" class="k">PRECISION</text>
  <text x="68" y="232" class="v">0.61</text>

  <rect x="282" y="140" width="220" height="140" rx="22" fill="#EEF7FB" stroke="#7DAEC5" stroke-width="2" filter="url(#shadow)"/>
  <text x="308" y="175" class="k">RECALL</text>
  <text x="308" y="232" class="v">0.59</text>

  <rect x="522" y="140" width="220" height="140" rx="22" fill="#FFF7E8" stroke="#D9B463" stroke-width="2" filter="url(#shadow)"/>
  <text x="548" y="175" class="k">F1 SCORE</text>
  <text x="548" y="232" class="v">0.60</text>

  <rect x="762" y="140" width="376" height="140" rx="22" fill="#F8F1EE" stroke="#D19B8B" stroke-width="2" filter="url(#shadow)"/>
  <text x="788" y="175" class="k">TEST AUPR</text>
  <text x="788" y="232" class="v">0.638</text>
  <text x="788" y="262" class="small">Ranking quality on held-out test data</text>

  <rect x="42" y="320" width="520" height="390" rx="24" fill="#FFFFFF" stroke="#DDD8E6" stroke-width="2" filter="url(#shadow)"/>
  <text x="72" y="362" class="h">Confusion Matrix Snapshot</text>
  <text x="72" y="390" class="small">Artifact: confusion_matrix.json</text>

  <text x="240" y="432" class="small">Predicted 0</text>
  <text x="394" y="432" class="small">Predicted 1</text>
  <text x="72" y="520" class="small">Actual 1</text>
  <text x="72" y="640" class="small">Actual 0</text>

  <rect x="180" y="460" width="140" height="100" rx="18" fill="#F5F4FB" stroke="#A18CC9" stroke-width="2"/>
  <text x="222" y="500" class="cellh">FN</text>
  <text x="214" y="535" class="cellv">697</text>

  <rect x="350" y="460" width="140" height="100" rx="18" fill="#F0FAF3" stroke="#7CAF8D" stroke-width="2"/>
  <text x="392" y="500" class="cellh">TP</text>
  <text x="375" y="535" class="cellv">1019</text>

  <rect x="180" y="580" width="140" height="100" rx="18" fill="#EFF5FB" stroke="#86ABC5" stroke-width="2"/>
  <text x="222" y="620" class="cellh">TN</text>
  <text x="196" y="655" class="cellv">12134</text>

  <rect x="350" y="580" width="140" height="100" rx="18" fill="#FFF4EF" stroke="#D79B86" stroke-width="2"/>
  <text x="392" y="620" class="cellh">FP</text>
  <text x="387" y="655" class="cellv">644</text>

  <rect x="600" y="320" width="538" height="390" rx="24" fill="#FFFCF6" stroke="#E3D5BC" stroke-width="2" filter="url(#shadow)"/>
  <text x="630" y="362" class="h">Interpretation</text>
  <text x="630" y="404" class="txt">This backtest screenshot makes the project more credible</text>
  <text x="630" y="430" class="txt">because it shows how the trained model behaves after training.</text>
  <text x="630" y="478" class="txt">It demonstrates:</text>
  <text x="630" y="510" class="txt">• evaluation on a held-out time period</text>
  <text x="630" y="540" class="txt">• threshold-based operational metrics</text>
  <text x="630" y="570" class="txt">• confusion matrix tracking for model behavior</text>
  <text x="630" y="600" class="txt">• alignment between ranking and classification metrics</text>
  <text x="630" y="650" class="small">Artifact values reflected here:</text>
  <text x="630" y="678" class="mono">TP=1019  FP=644  FN=697  TN=12134</text>
</svg>
