<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4EFE7"/>
      <stop offset="1" stop-color="#EDF6F2"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A3C34"/>
      <stop offset="1" stop-color="#2C6B5A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#16352F" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 28px 'DejaVu Sans', Arial, sans-serif; fill: #F7FBF9; }
      .sub { font: 400 15px 'DejaVu Sans', Arial, sans-serif; fill: #D7ECE6; }
      .h { font: 700 21px 'DejaVu Sans', Arial, sans-serif; fill: #17382F; }
      .k { font: 600 13px 'DejaVu Sans', Arial, sans-serif; fill: #648075; letter-spacing: 0.08em; }
      .v { font: 700 34px 'DejaVu Sans', Arial, sans-serif; fill: #17382F; }
      .txt { font: 400 16px 'DejaVu Sans', Arial, sans-serif; fill: #315047; }
      .small { font: 400 14px 'DejaVu Sans', Arial, sans-serif; fill: #46685D; }
      .mono { font: 400 14px 'DejaVu Sans Mono', monospace; fill: #315047; }
      .tableh { font: 700 15px 'DejaVu Sans', Arial, sans-serif; fill: #17382F; }
      .cell { font: 400 15px 'DejaVu Sans Mono', monospace; fill: #315047; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="26" fill="url(#bg)"/>
  <rect x="22" y="22" width="1156" height="86" rx="20" fill="url(#top)"/>
  <text x="52" y="58" class="title">Screenshot Style Output 2: Daily Batch Inference</text>
  <text x="52" y="84" class="sub">Based on flagged_players.json stored in MLflow artifacts</text>

  <rect x="42" y="140" width="220" height="140" rx="22" fill="#F0F8F4" stroke="#7CB197" stroke-width="2" filter="url(#shadow)"/>
  <text x="68" y="175" class="k">RUN DATE</text>
  <text x="68" y="230" class="v">2024-06-20</text>

  <rect x="282" y="140" width="220" height="140" rx="22" fill="#FFF9E8" stroke="#D8B766" stroke-width="2" filter="url(#shadow)"/>
  <text x="308" y="175" class="k">FLAGGED PLAYERS</text>
  <text x="308" y="232" class="v">39</text>

  <rect x="522" y="140" width="250" height="140" rx="22" fill="#EDF6FB" stroke="#7AA8C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="548" y="175" class="k">MODEL SOURCE</text>
  <text x="548" y="212" class="txt">MLflow registry</text>
  <text x="548" y="238" class="mono">SparkLogisticRegression_train@production</text>

  <rect x="792" y="140" width="346" height="140" rx="22" fill="#FFF2EE" stroke="#D58F7C" stroke-width="2" filter="url(#shadow)"/>
  <text x="818" y="175" class="k">OUTPUT CONTRACT</text>
  <text x="818" y="212" class="txt">player_idx | p_churn | risk_level | scoring_date</text>
  <text x="818" y="238" class="small">Used for daily retention targeting</text>

  <rect x="42" y="320" width="710" height="390" rx="24" fill="#FFFFFF" stroke="#D7E2DD" stroke-width="2" filter="url(#shadow)"/>
  <text x="72" y="362" class="h">Flagged Players Preview</text>
  <text x="72" y="390" class="small">Example rows derived from repository artifact data</text>

  <rect x="72" y="420" width="650" height="42" rx="10" fill="#EAF4EF"/>
  <text x="100" y="447" class="tableh">player_idx</text>
  <text x="285" y="447" class="tableh">p_churn</text>
  <text x="445" y="447" class="tableh">risk_level</text>
  <text x="585" y="447" class="tableh">scoring_date</text>

  <rect x="72" y="470" width="650" height="40" rx="8" fill="#FCFDFD"/>
  <text x="100" y="496" class="cell">392</text>
  <text x="285" y="496" class="cell">0.81</text>
  <text x="445" y="496" class="cell">High</text>
  <text x="585" y="496" class="cell">2024-06-20</text>

  <rect x="72" y="518" width="650" height="40" rx="8" fill="#F6FBF8"/>
  <text x="100" y="544" class="cell">540</text>
  <text x="285" y="544" class="cell">0.74</text>
  <text x="445" y="544" class="cell">Medium</text>
  <text x="585" y="544" class="cell">2024-06-20</text>

  <rect x="72" y="566" width="650" height="40" rx="8" fill="#FCFDFD"/>
  <text x="100" y="592" class="cell">99</text>
  <text x="285" y="592" class="cell">0.84</text>
  <text x="445" y="592" class="cell">High</text>
  <text x="585" y="592" class="cell">2024-06-20</text>

  <rect x="72" y="614" width="650" height="40" rx="8" fill="#F6FBF8"/>
  <text x="100" y="640" class="cell">457</text>
  <text x="285" y="640" class="cell">0.70</text>
  <text x="445" y="640" class="cell">Medium</text>
  <text x="585" y="640" class="cell">2024-06-20</text>

  <rect x="72" y="662" width="650" height="40" rx="8" fill="#FCFDFD"/>
  <text x="100" y="688" class="cell">3</text>
  <text x="285" y="688" class="cell">0.86</text>
  <text x="445" y="688" class="cell">High</text>
  <text x="585" y="688" class="cell">2024-06-20</text>

  <rect x="790" y="320" width="348" height="390" rx="24" fill="#FFFCF2" stroke="#E0D2A9" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="362" class="h">Why This Helps</text>
  <text x="820" y="402" class="txt">This makes the project feel deployable.</text>
  <text x="820" y="438" class="txt">The model is not only trained and evaluated,</text>
  <text x="820" y="464" class="txt">it is also used in a daily scoring workflow.</text>
  <text x="820" y="514" class="txt">Portfolio signal:</text>
  <text x="820" y="544" class="txt">• batch inference from a registered model</text>
  <text x="820" y="574" class="txt">• output table for downstream action</text>
  <text x="820" y="604" class="txt">• interpretable risk levels for operations</text>
  <text x="820" y="654" class="small">Artifact values reflected here:</text>
  <text x="820" y="682" class="mono">39 flagged players in stored example output</text>
</svg>
