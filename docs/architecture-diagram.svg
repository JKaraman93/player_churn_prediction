<svg width="1100" height="760" viewBox="0 0 1100 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3E8"/>
      <stop offset="1" stop-color="#E7F1EC"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#113946"/>
      <stop offset="1" stop-color="#1D5B79"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#113946" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1D5B79"/>
    </marker>
    <style>
      .title { font: 700 32px 'DejaVu Sans', Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 16px 'DejaVu Sans', Arial, sans-serif; fill: #D9E8EE; }
      .box-title { font: 700 22px 'DejaVu Sans', Arial, sans-serif; fill: #113946; }
      .box-text { font: 400 16px 'DejaVu Sans', Arial, sans-serif; fill: #2F4858; }
      .note-title { font: 700 18px 'DejaVu Sans', Arial, sans-serif; fill: #7C4F21; }
      .note-text { font: 400 14px 'DejaVu Sans', Arial, sans-serif; fill: #5F4B32; }
      .label { font: 700 14px 'DejaVu Sans', Arial, sans-serif; fill: #1D5B79; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1100" height="760" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1052" height="92" rx="22" fill="url(#header)"/>
  <text x="56" y="68" class="title">Player Churn Prediction Architecture</text>
  <text x="56" y="94" class="subtitle">Synthetic data generation, medallion pipelines, model training, MLflow registry, batch inference, and backtesting</text>

  <text x="130" y="168" class="label">DATA FOUNDATION</text>
  <text x="450" y="168" class="label">FEATURE + MODEL LAYER</text>
  <text x="810" y="168" class="label">OPERATIONS</text>

  <rect x="70" y="190" width="250" height="120" rx="24" fill="#FFF8E8" stroke="#D9B26F" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="230" class="box-title">Synthetic Data</text>
  <text x="100" y="258" class="box-text">Players, sessions, and</text>
  <text x="100" y="280" class="box-text">transactions generated with</text>
  <text x="100" y="302" class="box-text">behavioral rules in PySpark</text>

  <rect x="70" y="350" width="250" height="110" rx="24" fill="#F5F1FF" stroke="#9C89C8" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="390" class="box-title">Bronze</text>
  <text x="100" y="418" class="box-text">Raw event tables stored as</text>
  <text x="100" y="440" class="box-text">Parquet datasets</text>

  <rect x="70" y="500" width="250" height="120" rx="24" fill="#EAF6F1" stroke="#6AA68A" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="540" class="box-title">Silver</text>
  <text x="100" y="568" class="box-text">Cleaned events, deduplication,</text>
  <text x="100" y="590" class="box-text">balance logic, trusted source</text>

  <rect x="420" y="190" width="260" height="120" rx="24" fill="#EAF2FB" stroke="#6B9AC4" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="230" class="box-title">Gold Features</text>
  <text x="450" y="258" class="box-text">Player snapshots, rolling</text>
  <text x="450" y="280" class="box-text">behavior features, churn labels</text>
  <text x="450" y="302" class="box-text">with strict time causality</text>

  <rect x="420" y="350" width="260" height="120" rx="24" fill="#FFF1EC" stroke="#D98B73" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="390" class="box-title">Model Training</text>
  <text x="450" y="418" class="box-text">Spark ML pipeline, CV, class</text>
  <text x="450" y="440" class="box-text">weighting, threshold tuning</text>

  <rect x="420" y="510" width="260" height="110" rx="24" fill="#F8F6E7" stroke="#B6A661" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="550" class="box-title">MLflow</text>
  <text x="450" y="578" class="box-text">Experiments, artifacts, model</text>
  <text x="450" y="600" class="box-text">registry, reproducibility</text>

  <rect x="780" y="230" width="250" height="120" rx="24" fill="#EEF7FB" stroke="#79AFC4" stroke-width="2" filter="url(#shadow)"/>
  <text x="810" y="270" class="box-title">Batch Inference</text>
  <text x="810" y="298" class="box-text">Daily scoring from the</text>
  <text x="810" y="320" class="box-text">production model in MLflow</text>
  <text x="810" y="342" class="box-text">with player risk levels</text>

  <rect x="780" y="420" width="250" height="120" rx="24" fill="#F4F0FA" stroke="#9A84C2" stroke-width="2" filter="url(#shadow)"/>
  <text x="810" y="460" class="box-title">Backtesting</text>
  <text x="810" y="488" class="box-text">Held-out period evaluation,</text>
  <text x="810" y="510" class="box-text">calibration, daily metrics</text>

  <rect x="760" y="590" width="290" height="110" rx="24" fill="#FFF7E6" stroke="#D1A85A" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="630" class="note-title">Portfolio Takeaway</text>
  <text x="790" y="656" class="note-text">One codebase covering data engineering,</text>
  <text x="790" y="676" class="note-text">feature design, model training, and</text>
  <text x="790" y="696" class="note-text">production-style scoring workflows.</text>

  <line x1="195" y1="310" x2="195" y2="350" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="195" y1="460" x2="195" y2="500" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="320" y1="555" x2="420" y2="555" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="550" y1="310" x2="550" y2="350" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="550" y1="470" x2="550" y2="510" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="680" y1="555" x2="780" y2="555" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="680" y1="555" x2="730" y2="350" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="905" y1="350" x2="905" y2="420" stroke="#1D5B79" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
